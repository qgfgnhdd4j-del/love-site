<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Video Style</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

.slide{
position:absolute;
width:100%;
height:100vh;
object-fit:cover;
opacity:0;
transition:1s ease-in-out;
}

.active{
opacity:1;
}

/* الكلام الأساسي */
.text{
position:absolute;
bottom:150px;
width:100%;
text-align:center;
color:white;
font-size:18px;
font-weight:bold;
text-shadow:0 0 10px black;
padding:0 10px;
line-height:1.4;
}

/* التاريخ */
.date{
position:absolute;
bottom:95px;
width:100%;
text-align:center;
color:pink;
font-size:15px;
}

/* الكلام الإضافي */
.text-small{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
color:white;
font-size:13px;
opacity:0.9;
padding:0 10px;
line-height:1.4;
}
</style>
</head>

<body>

<img src="img1.jpg" class="slide active">
<img src="img2.jpg" class="slide">
<img src="img3.jpg" class="slide">

<div class="text">
❤️ انهردا ٢٨ / ٤ ده احلا يوم ف حياتي عشان كملت معاكي سنه ي احلي مريومه ف الدنيا بحبك ينور عيني ربنا يخليكي ليا وميحرمنيش منك ❤️
</div>

<div class="date">
28 / 04 / 2025
</div>

<div class="text-small">
هو هو نفس اليوم اللي اعترفنا فيه بحبنا لبعض وهو هو ف نفس اليوم كانت اول مقابله فيه واليوم ده الي حسيت فيه اني اتولدت من جديد ❤️
</div>

<audio autoplay loop>
<source src="song.mp3">
</audio>

<script>
let slides=document.querySelectorAll(".slide");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

document.body.addEventListener("click",()=>{
document.querySelector("audio").play();
});
</script>

</body>
</html>
